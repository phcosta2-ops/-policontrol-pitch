<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoliControl — Pitch SDR</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#08090d;--surf:#0f1117;--card:#141720;--bdr:#1f2433;--accent:#3b82f6;--accent2:#60a5fa;--gold:#f59e0b;--text:#e2e8f0;--muted:#4b5563;--success:#10b981;--danger:#f43f5e;--purple:#a78bfa;--teal:#2dd4bf;--orange:#fb923c;--green:#4ade80}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;font-size:13px}
  .hdr{height:56px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
  .logo-box{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:white}
  .logo-wrap{display:flex;align-items:center;gap:10px}
  .logo-txt h1{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:-0.3px}
  .logo-txt p{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
  .hdr-stats{display:flex;gap:12px;align-items:center}
  .stat-pill{font-size:11px;color:var(--muted)}
  .stat-pill b{color:var(--gold)}
  .danger-badge{font-size:11px;background:rgba(244,63,94,0.12);border:1px solid rgba(244,63,94,0.3);color:var(--danger);padding:3px 10px;border-radius:12px}
  .main{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px)}
  .sidebar{background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
  .sb-top{padding:12px;border-bottom:1px solid var(--bdr)}
  .filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
  .fbtn{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid var(--bdr);cursor:pointer;font-family:inherit;font-weight:500;text-transform:uppercase;letter-spacing:.5px;background:transparent;color:var(--muted);transition:all .15s}
  .fbtn.on{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent2)}
  .srch{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
  .srch:focus{border-color:var(--accent)}
  .sb-count{font-size:10px;color:var(--muted);padding:6px 14px;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:1px}
  .clist{overflow-y:auto;flex:1}
  .clist::-webkit-scrollbar{width:3px}
  .clist::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
  .ci{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid rgba(255,255,255,.025);transition:all .12s}
  .ci:hover{background:var(--card);border-left-color:var(--accent)}
  .ci.on{background:rgba(59,130,246,.07);border-left-color:var(--accent)}
  .ci-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.3}
  .ci-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .ltv{font-size:11px;color:var(--gold);font-weight:600}
  .seg{font-size:9.5px;padding:1px 5px;border-radius:3px;font-weight:600;text-transform:uppercase}
  .seg-san{background:rgba(16,185,129,.12);color:#34d399}
  .seg-pha{background:rgba(167,139,250,.12);color:#c4b5fd}
  .seg-lab{background:rgba(245,158,11,.12);color:#fbbf24}
  .nc-badge{font-size:9px;background:rgba(99,102,241,.15);color:#818cf8;padding:1px 5px;border-radius:3px;font-weight:700}
  .panel{flex:1;overflow-y:auto;background:var(--bg)}
  .panel::-webkit-scrollbar{width:3px}
  .panel::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:14px}
  .empty-ico{width:64px;height:64px;background:var(--card);border:1px solid var(--bdr);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px}
  .empty h3{font-family:'Syne',sans-serif;font-size:16px;color:var(--text);font-weight:600}
  .empty p{font-size:12.5px;text-align:center;max-width:240px;line-height:1.7}
  .dbody{padding:20px 28px;display:flex;flex-direction:column;gap:14px}
  .card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px}
  .card-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:10px}
  .prod-chip{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--accent2);margin-bottom:6px}
  .strat-card{border-radius:10px;padding:14px 16px;border:1px solid}
  .strat-card.vials{background:rgba(167,139,250,.05);border-color:rgba(167,139,250,.25)}
  .strat-card.manut{background:rgba(251,146,60,.05);border-color:rgba(251,146,60,.25)}
  .strat-card.consumo{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.25)}
  .strat-card.expansion{background:rgba(96,165,250,.05);border-color:rgba(96,165,250,.25)}
  .strat-card.micro{background:rgba(45,212,191,.05);border-color:rgba(45,212,191,.25)}
  .strat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:5px}
  .vials .strat-label{color:var(--purple)}.manut .strat-label{color:var(--orange)}.consumo .strat-label{color:var(--green)}.expansion .strat-label{color:var(--accent2)}.micro .strat-label{color:var(--teal)}
  .strat-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}
  .strat-rat{font-size:12px;color:#94a3b8;line-height:1.65;margin-bottom:10px}
  .bullet{font-size:11.5px;color:var(--muted);padding-left:14px;position:relative;margin-bottom:4px;line-height:1.5}
  .bullet::before{content:'→';position:absolute;left:0;font-size:10px}
  .vials .bullet::before{color:var(--purple)}.manut .bullet::before{color:var(--orange)}.consumo .bullet::before{color:var(--green)}.expansion .bullet::before{color:var(--accent2)}.micro .bullet::before{color:var(--teal)}
  .nc-alert{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:8px;padding:12px 14px}
  .nc-alert-title{font-size:11px;color:#818cf8;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
  .nc-alert-body{font-size:12px;color:#94a3b8}
  .pitch-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
  .pitch-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(59,130,246,.05);border-bottom:1px solid var(--bdr)}
  .pitch-hdr h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
  .gen-btn{background:linear-gradient(135deg,var(--accent),#1d4ed8);color:white;border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
  .gen-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,.35)}
  .gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
  .pitch-body{padding:16px;min-height:80px}
  .pitch-placeholder{color:var(--muted);font-size:12.5px;font-style:italic;text-align:center;padding:20px 0}
  .dots{display:none;justify-content:center;gap:6px;padding:20px 0}
  .dots.on{display:flex}
  .dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bop 1.2s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes bop{0%,80%,100%{transform:scale(.6);opacity:.2}40%{transform:scale(1);opacity:1}}
  .pitch-out{display:none}
  .pitch-out.on{display:block}
  .subj-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:7px;padding:10px 12px;margin-bottom:12px}
  .subj-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:700;margin-bottom:3px}
  .subj-val{font-size:13.5px;color:var(--text);font-weight:600}
  .pitch-text{white-space:pre-wrap;font-size:13px;line-height:1.8}
  .pitch-foot{display:none;gap:8px;padding:10px 16px;border-top:1px solid var(--bdr)}
  .pitch-foot.on{display:flex}
  .act-btn{background:var(--surf);border:1px solid var(--bdr);color:var(--text);padding:5px 12px;border-radius:7px;font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .act-btn:hover{border-color:var(--accent);color:var(--accent2)}
  .act-btn.ok{color:var(--success);border-color:var(--success)}
  .dh-card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:18px 20px}
  .dh-status{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .status-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .dh-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.2}
  .stats-row{display:flex;gap:20px;flex-wrap:wrap}
  .stat-item .lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:500}
  .stat-item .val{font-size:14px;font-weight:700}
  .cr-row{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;margin-bottom:5px}
  .cr-name{font-weight:500}
  .cr-email{color:var(--muted);font-size:11px}
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;height:100vh">
<header class="hdr">
  <div class="logo-wrap">
    <div class="logo-box">PC</div>
    <div class="logo-txt"><h1>PoliControl — Pitch SDR</h1><p>Motor de Estratégia · v3.0</p></div>
  </div>
  <div class="hdr-stats">
    <span class="stat-pill">Clientes: <b id="totalCount">—</b></span>
    <span class="stat-pill">LTV em risco: <b>R$ 26,9M</b></span>
    <span class="danger-badge">🔴 Churn Priority</span>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="filters" id="filters">
        <button class="fbtn on" onclick="setFilter('all',this)">Todos</button>
        <button class="fbtn" onclick="setFilter('saneamento',this)">Saneamento</button>
        <button class="fbtn" onclick="setFilter('pharma',this)">Farmacêutica</button>
        <button class="fbtn" onclick="setFilter('lab',this)">Laboratório</button>
        <button class="fbtn" onclick="setFilter('nocontact',this)" style="border-color:rgba(99,102,241,.4);color:#818cf8">❓ Sem Contato</button>
      </div>
      <input class="srch" id="srch" type="text" placeholder="Buscar cliente…" oninput="render()">
    </div>
    <div class="sb-count" id="sbCount"></div>
    <div class="clist" id="cList"></div>
  </aside>

  <section class="panel" id="panel">
    <div class="empty" id="emptyState">
      <div class="empty-ico">🎯</div>
      <h3>Selecione um cliente</h3>
      <p>O motor analisa o histórico de compras e define a melhor estratégia — incluindo cross-sell de microbiologia.</p>
    </div>
    <div id="detail" style="display:none"></div>
  </section>
</div>
</div>

<script>
// ─── STRATEGY ENGINE ────────────────────────────────────────────────────────────
const MICRO_KW = ['AP2000','AQUACOLOR CLORO','AQUACOLOR COR','AQUACOLOR FLUOR','TURBIDIMETRO','TURBTRACK','DSNET','FLOCCONTROL','COR 450'];
const hasMicroPot = p => MICRO_KW.some(k => p.join(' ').toUpperCase().includes(k));
const hasMicroAlr = p => /MPN|POLITRAY|COLICONTROL|COLIFORMES|POLI-SEALER/.test(p.join(' ').toUpperCase());

function classify(c) {
  const all = c.products.join(' ').toUpperCase(), seg = c.segment;
  if (seg === 'pharma') {
    const hasTOC = /TOC|M9 |860 |INNOVOX|DATAPRO|CHECKPOINT|ECLIPSE/.test(all);
    const hasMnt = /MANUTENCAO|PREVENTIVA|CORRETIVA/.test(all);
    if (hasTOC && hasMnt) return {type:'vials',icon:'💜',label:'Vials Certificados + Padrões TOC',title:'TOC + manutenção → consumíveis certificados',rat:'Reutilização de vials ou genéricos introduz carbon de background → OOS → investigação CAPA. Vials Sievers Certified <10 ppb (ISO 9001, COA USP) eliminam esse risco.',bullets:['Sievers Certified Vials <10 ppb — COA rastreável à USP por lote','DUCT Vials: TOC + condutividade simultâneos (USP <643>/<645>) em único frasco','Padrões M9 Cal & Ver rastreáveis à USP','Cartuchos originais (Oxidizer/Acid) — peças de terceiros invalidam validação']};
    if (hasTOC && !hasMnt) return {type:'manut',icon:'🟠',label:'Manutenção Preventiva + Peças Originais',title:'TOC sem manutenção PoliControl → risco crítico',rat:'Terceiros usam peças não originais → deriva analítica → falsa liberação de água WFI, violação RDC 658/2022. PoliControl é distribuidor oficial Veolia/Sievers com peças com COA.',bullets:['PoliControl = único distribuidor oficial Veolia/Sievers no Brasil','Peças originais com COA rastreável — única garantia de manutenção da validação','PM anual + Resin Bed + cartuchos originais + verificação de performance','Pacote PM + consumíveis: previsibilidade de custo e conformidade']};
    if (!hasTOC && hasMnt) return {type:'manut',icon:'🟠',label:'Consumíveis + Cross-sell',title:'Cliente de manutenção → ampliar consumíveis',rat:'Cliente já confia na PoliControl. Ampliar com fornecimento completo de cartuchos, vials e padrões.',bullets:['Acid/Oxidizer Cartridge originais com cronograma de substituição','Vials <10 ppb — se reutiliza, cada frasco reciclado é risco de OOS','Pacote anual PM + consumíveis com previsibilidade de custo']};
    return {type:'vials',icon:'💜',label:'Consumíveis TOC Certificados',title:'Farma → reposição e vials certificados',rat:'Garantir cadência de reposição e vials certificados para conformidade USP/ANVISA.',bullets:['Vials <10 ppb produzidos em cleanroom, certificados por lote','DUCT Vials para TOC + condutividade simultâneos','Padrões Cal & Ver rastreáveis à USP']};
  }
  const hasInst = /AP2000|TURBIDIMETRO|AQUACOLOR|FLOCCONTROL|MPN READER|ANALISADOR|TURBTRACK|DSNET|COR 450|NESSLERQUANTI|AQUAPRO|COLORIMETRO|FOTOCOLORIM/.test(all);
  const hasReag = /REAG|REAGENTE|PASTILHA|COLICONTROL|COLIFORMES|SACHE|VISODISC|DPD|CLS[1-4]|KIT COLIFORME/.test(all);
  const hasOnline = /TURBTRACK|DSNET|COR 450|ONLINE/.test(all);
  const hasMPN = /MPN READER|POLITRAY|POLI-SEALER|COLICONTROL|COLITAG|COLIFORMES/.test(all);
  const crossM = hasMicroPot(c.products) && !hasMicroAlr(c.products);
  if (hasOnline && !hasInst) return {type:'expansion',icon:'🔵',label:'Online → Laboratório',title:'Equipamentos online → instrumentos portáteis/bancada',rat:'Clientes com online (TurbTrack, DSNet, COR 450) precisam de bancada para confirmar leituras e emitir laudos válidos ao MS.',bullets:['Turbidímetro AP2000 WT/IR IP67 — confirmação laboratorial para laudos válidos','AquaColor Cloro, Fluor, Cor RGB para análises complementares','Reagentes DPD, SPADNS e padrões StabGel (validade ~6 meses)',crossM?'🧫 MPN Reader + Politray: coliformes/E.coli — exigência Portaria MS 888/2021':null].filter(Boolean)};
  if (hasInst && !hasReag) return {type:'consumo',icon:'🟢',label:'Consumíveis + Calibração',title:'Instrumentos sem consumíveis → repor urgente',rat:'Para dados válidos ao MS (Portaria 888/2021), instrumento precisa de padrões RBC no prazo e reagentes dentro da validade. Padrões vencem em ~6 meses. Cubetas riscam. Reagentes DPD degradam.',bullets:[/AP2000|TURBIDIMETRO/.test(all)?'Padrões StabGel (0-10/10-100/100-1000 NTU) — validade ~6 meses':null,/AP2000|TURBIDIMETRO/.test(all)?'Cubetas AP2000 — riscam após ~6 meses':null,/AQUACOLOR CLORO|FOTOCOLORIM/.test(all)?'Reagentes CLS1/CLS2 ou DPD Cloro — validade curta após abertura':null,/AQUACOLOR FLUOR/.test(all)?'Reagentes SPADNS fluoreto — prazo curto':null,/FLOCCONTROL/.test(all)?'Correia Floccontrol III/IV — peça de desgaste semestral':null,'Calibração com certificado RBC — requisito legal Portaria MS 888/2021',crossM?'🧫 MPN Reader + Politray: coliformes/E.coli complementa o portfólio':null].filter(Boolean)};
  if (hasInst && hasReag && !hasMPN && crossM) return {type:'micro',icon:'🧫',label:'Cross-sell Microbiologia',title:'Base consolidada → entrada em microbiologia',rat:'Com instrumentos + reagentes comprados, o próximo passo é análise microbiológica. Exigência Portaria MS 888/2021.',bullets:['MPN Reader — coliformes/E.coli automático, resultado <24h','Politray-E Cartelas Estéreis 97 poços — consumível mensal recorrente','Poli-Sealer — seladora exclusiva PoliControl','ColiControl 100 em flaconete (ONPG/MUG) — análises em campo']};
  if (hasInst && hasReag) return {type:'expansion',icon:'🔵',label:'Expansão de Portfólio',title:'Cliente consolidado → ampliar parâmetros',rat:'Base sólida. Expandir os parâmetros monitorados alinhando com exigências da ANA e Portaria MS 888/2021.',bullets:[/TURBIDIMETRO/.test(all)?'Tem turbidímetro → AquaColor Cloro, Fluor e pHmetro':null,/AQUACOLOR CLORO|FOTOCOLORIM/.test(all)?'Tem fotocolorímetro → turbidímetro AP2000 e medidor de pH':null,'Reposição programada de reagentes e padrões trimestral','Calibração RBC anual — requisito Portaria MS 888/2021',!hasMPN?'🧫 MPN Reader + Politray para coliformes/E.coli':null].filter(Boolean)};
  if (hasReag && !hasInst) return {type:'consumo',icon:'🟢',label:'Reposição + Upsell Instrumento',title:'Reagentes sem instrumento → instrumento próprio',rat:'Compra reagentes mas usa instrumentos de terceiros. Oportunidade de garantir rastreabilidade com instrumento próprio.',bullets:['AquaColor Cloro FE IP67 — rastreabilidade e independência de terceiros','Kit SMART Cloro/pH — padronizado, menor erro operacional','Calibração RBC para instrumentos em uso',crossM?'🧫 MPN Reader para coliformes — fecha o ciclo de análise':null].filter(Boolean)};
  if (hasMPN) return {type:'micro',icon:'🧫',label:'Reposição Microbiologia',title:'Cliente de microbiologia → reposição de consumíveis',rat:'Já usa a linha de microbiologia. Foco em continuidade do fornecimento de consumíveis de alto giro.',bullets:['Politray-E Cartelas Estéreis 97 poços — alta rotatividade mensal','Borracha para cartelas Poli Tray — peça de desgaste da seladora','ColiControl 100 em flaconete — análises em campo','Verificar estado da Poli-Sealer — manutenção ou substituição']};
  return {type:'expansion',icon:'🔵',label:'Reativação · Portfólio 2025/2026',title:'Cliente inativo → reativar',rat:'Histórico relevante sem compras recentes. Reativação consultiva.',bullets:['Novidades PoliControl 2025/2026 para o segmento','Verificar status dos equipamentos — oportunidade de manutenção/calibração','Mapear novos parâmetros exigidos pelas normas vigentes']};
}

// ─── DATA ───────────────────────────────────────────────────────────────────────
const RAW=[["COMPANHIA DE SANEAMENTO DE MINAS GERAIS COPASA MG","R$ 1.387.449","R$ 1.012.835","13/02/2025",10.5,"R$ 8.781","ISMAEL ALVES | Hygo Dias | THOMPSON FERNANDES DE CASTRO | ORDONES LUIS DE  MELO | FAGNER MOREIRA DE ","henrique.campos@copasa.com.br","saneamento","⚠️ Risco",["MEDIDOR DE ATIVIDADE MICROBIOLOGICA C/ 1 SENSOR MARCA SENTRY","SENSOR P/A MEDIDOR DE ATIVIDADE MICROBIOLOGICA - SENTRY","SOL.SPADNS ANALISE DE FLUOR   500ML  FRS POLIETILENO"],"(34) 3823-8834","Marília"],
["COMPANHIA ESPIRITO SANTENSE DE SANEAMENTO CESAN","R$ 865.304","R$ 424.454","11/11/2024",13.6,"R$ 28.843","Thais Simora | Angelo Leonardo Gorza | Fernando Cordei | LORENA | Antonio Simoes | Thais Simora Carn","antonio.simoes@cesan.com.br","pharma","🔴 Churn",["PASTILHA CLORO DPD 1 CAIXA COM 1000 PASTILHAS CODIGO 6903AM  LM","FOTOCOLORIMETRO AQUACOLOR COR RGB IP 67","FOTOCOLORIMETRO AQUACOLOR FLUOR IP 67"],"(27) 2127.6757","Vendas"],

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const list=clients.filter(c=>{
    const mSeg=activeFilter==='all'?true:activeFilter==='nocontact'?c.noContact:(c.segment===activeFilter&&!c.noContact);
    return mSeg&&c.name.toLowerCase().includes(q);
  });
  document.getElementById('sbCount').textContent=list.length+' clientes';
  document.getElementById('cList').innerHTML=list.map((c,i)=>{
    const s=classify(c);
    const idx=clients.indexOf(c);
    const isOn=current===c;
    return `<div class="ci${isOn?' on':''}" onclick="select(${idx})">
      <div class="ci-name">${c.name}</div>
      <div class="ci-meta">
        <span class="ltv">${c.ltv}</span>
        <span class="seg ${SEG_CLS[c.segment]}">${SEG_LBL[c.segment]}</span>
        <span title="${s.label}">${s.icon}</span>
        <span style="font-size:10px;color:${c.status.includes('Churn')?'#f43f5e':'#f59e0b'}">${c.status}</span>
        ${c.noContact?'<span class="nc-badge">❓</span>':''}
      </div>
    </div>`;
  }).join('');
}

function select(idx){
  current=clients[idx];
  pitchText='';
  render();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('detail').style.display='block';

  const s=classify(current);
  const showMicro=s.type!=='micro'&&hasMicroPot(current.products)&&!hasMicroAlr(current.products)&&current.segment!=='pharma';
  const isChurn=current.status.includes('Churn');

  const stratBullets=s.bullets.map(b=>`<div class="bullet">${b}</div>`).join('');

  const microBox=showMicro?`<div class="strat-card micro">
    <div class="strat-label">🧫 Cross-sell Microbiologia</div>
    <div class="strat-title">Histórico físico-químico → potencial para microbiologia</div>
    <div class="strat-rat">Exigência Portaria MS 888/2021. MPN Reader + Politray: resultado &lt;24h, menor custo/ensaio vs. método tradicional.</div>
    <div class="bullet">MPN Reader — coliformes/E.coli automático em &lt;24h</div>
    <div class="bullet">Politray-E Cartelas Estéreis 97 poços — consumível mensal recorrente</div>
    <div class="bullet">ColiControl 100 em flaconete (ONPG/MUG)</div>
    <div class="bullet">Poli-Sealer — seladora exclusiva PoliControl</div>
  </div>`:'';

  const phoneRow=current.phone?`<div class="cr-row" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07)"><span style="font-size:11px;color:#94a3b8">📞</span><span class="cr-name" style="color:#a3e635">${current.phone}</span></div>`:'';
  const respRow=current.responsavel&&current.responsavel!=='Vendas'?`<div class="cr-row"><span style="font-size:11px;color:#94a3b8">🏷️ Resp. interno:</span><span class="cr-name" style="color:#c4b5fd">${current.responsavel}</span></div>`:'';
  const ctBox=current.noContact?`<div class="nc-alert">
    <div class="nc-alert-title">❓ Sem contato no Pipedrive</div>
    <div class="nc-alert-body">Prospectar via <b style="color:#c4b5fd">LinkedIn, site ou ligação</b> antes de enviar o email.</div>
  </div>`:[...current.contacts.split(' | ').slice(0,4).map((n,i)=>{
    const em=current.emails.split('|')[i]||'';
    return `<div class="cr-row"><span class="cr-name">${n}</span>${em?`<span class="cr-email">— ${em}</span>`:''}</div>`;
  }),phoneRow,respRow].join('');

  document.getElementById('detail').innerHTML=`
  <div class="dbody">
    <div class="dh-card">
      <div class="dh-status" style="color:${isChurn?'#f43f5e':'#f59e0b'}">
        <span class="status-dot" style="background:${isChurn?'#f43f5e':'#f59e0b'}"></span>
        ${current.status.replace('🔴 ','').replace('⚠️ ','')}
      </div>
      <div class="dh-name">${current.name}</div>
      <div class="stats-row">
        ${[['LTV Total',current.ltv,'#f59e0b'],['Fat. 2024',current.fat24,'#e2e8f0'],['Último Pedido',current.lastOrder,'#f43f5e'],['Meses s/ comprar',current.months+'m','#f43f5e'],['Ticket Médio',current.ticket,'#60a5fa']].map(([l,v,c])=>`
        <div class="stat-item"><div class="lbl">${l}</div><div class="val" style="color:${c}">${v}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">🛒 Histórico · Top 3 Produtos</div>
      ${current.products.map(p=>`<div class="prod-chip">📦 ${p}</div>`).join('')}
    </div>
    <div class="strat-card ${s.type}" style="border-color:${STRAT_BC[s.type]};background:${STRAT_BG[s.type]}">
      <div class="strat-label" style="color:${STRAT_COLORS[s.type]}">${s.icon} ${s.label}</div>
      <div class="strat-title">${s.title}</div>
      <div class="strat-rat">${s.rat}</div>
      ${stratBullets}
    </div>
    ${microBox}
    <div class="card">
      <div class="card-title">👤 Contatos</div>
      ${ctBox}
    </div>
    <div class="pitch-wrap">
      <div class="pitch-hdr">
        <h3>📧 Email de Retomada Personalizado</h3>
        <button class="gen-btn" id="genBtn" onclick="genPitch()">✦ Gerar com IA</button>
      </div>
      <div class="pitch-body">
        <div class="pitch-placeholder" id="phTxt">Clique em "Gerar com IA" para criar o email personalizado.</div>
        <div class="dots" id="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pitch-out" id="pitchOut"></div>
      </div>
      <div class="pitch-foot" id="pitchFoot">
        <button class="act-btn" id="cpyBtn" onclick="copyPitch()">📋 Copiar Email</button>
        <button class="act-btn" onclick="genPitch()">🔄 Regenerar</button>
      </div>
    </div>
  </div>`;
}

const CONTEXT={
  vials:`FOCO: Vials certificados Sievers e padrões TOC. Reutilização de vials ou genéricos = carbon de background = OOS = investigação CAPA. Vials Sievers Certified <10 ppb (cleanroom ISO 9001, COA USP). PRODUTOS: Sievers Certified Vials, DUCT Vials, Padrões M9 Cal&Ver USP, Oxidizer/Acid Cartridge originais.`,
  manut:`FOCO: Manutenção preventiva peças originais Sievers/Veolia. Terceiros com peças não originais = deriva analítica = falsa liberação de água WFI, violação RDC 658/2022. PoliControl = único distribuidor oficial. PRODUTOS: PM anual, Acid/Oxidizer/Resin Bed originais, Kit Validation Cal&Ver.`,
  consumo:`FOCO: Reposição de consumíveis, reagentes e padrões. Padrões StabGel vencem em ~6 meses. Cubetas riscam em ~6 meses. Reagentes DPD degradam. Para dados válidos ao MS (Portaria 888/2021). PRODUTOS: Padrões StabGel, Cubetas AP2000, DPD Cloro Livre/Total, CLS1/CLS2, SPADNS, Calibração RBC.`,
  expansion:`FOCO: Expansão do portfólio analítico. Quem tem turbidímetro → cloro, pH, fluoreto. Quem tem online → bancada para laudos válidos. PRODUTOS: AquaColor Cloro/Fluor/Cor, AquaPro pH, AP2000, Floccontrol III/IV, MPN Reader, reagentes complementares.`,
  micro:`FOCO: MPN Reader + Politray. Portaria MS 888/2021 e ABNT exigem coliformes/E.coli. MPN Reader+Politray: resultado <24h, menor custo/ensaio. Politray = consumível mensal recorrente. PRODUTOS: MPN Reader, Politray-E Cartelas Estéreis 97 poços (cx 100 un.), Poli-Sealer, ColiControl 100 flaconete ONPG/MUG.`
};

async function genPitch(){
  if(!current) return;
  const s=classify(current);
  const btn=document.getElementById('genBtn');
  btn.disabled=true; btn.textContent='⏳ Gerando…';
  document.getElementById('phTxt').style.display='none';
  document.getElementById('dots').classList.add('on');
  document.getElementById('pitchOut').classList.remove('on');
  document.getElementById('pitchOut').innerHTML='';
  document.getElementById('pitchFoot').classList.remove('on');

  const hasCross=s.type!=='micro'&&hasMicroPot(current.products)&&!hasMicroAlr(current.products)&&current.segment!=='pharma';

  const prompt=`Você é Marcos, comercial da PoliControl — Instrumentos Analíticos. Escreva um email de retomada CURTO e DIRETO.

CLIENTE: ${current.name} | ${current.months} meses sem comprar
COMPROU: ${current.products.join(' | ')}
ESTRATÉGIA: ${CONTEXT[s.type]}
${hasCross?'EXTRA: Mencione em 1 frase o MPN Reader + Politray como complemento (exigência MS 888/2021).':''}

REGRAS ABSOLUTAS:
- MÁXIMO 80 palavras no corpo (sem assinatura)
- Abra direto no ponto — sem "espero que esteja bem", sem "faz um tempo", sem "estou retomando contato"
- NÃO explique normas ou conceitos que o cliente já sabe
- Linguagem de colega de profissão: conciso, objetivo, sem floreios
- 1 frase de abertura → 1-2 frases de oferta concreta → 1 CTA direto (resposta ou call 15 min)
- Assine: Marcos | PoliControl | (11) 4053-2060

FORMATO:
ASSUNTO: [máx 50 chars]

[corpo]`;

  try{
    const res=await fetch('https://empty-disk-a816.phcosta2.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(typeof data.error === "object" ? JSON.stringify(data.error) : data.error);
    const raw=data.content?.map(i=>i.text||'').join('')||'';
    pitchText=raw;

    const subjMatch=raw.match(/ASSUNTO:\s*(.+)/i);
    const body=raw.replace(/ASSUNTO:\s*.+\n*/i,'').trim();
    const out=document.getElementById('pitchOut');
    out.innerHTML='';
    if(subjMatch){
      out.innerHTML+=`<div class="subj-box"><div class="subj-lbl">📌 Assunto</div><div class="subj-val">${subjMatch[1].trim()}</div></div>`;
      pitchText=`Assunto: ${subjMatch[1].trim()}\n\n${body}`;
    }
    const d=document.createElement('div');
    d.className='pitch-text'; d.textContent=body;
    out.appendChild(d);
    out.classList.add('on');
    document.getElementById('pitchFoot').classList.add('on');
  }catch(e){
    const out=document.getElementById('pitchOut');
    out.innerHTML=`<div style="color:#f43f5e;font-size:12px">❌ Erro: ${e.message}</div>`;
    out.classList.add('on');
  }
  document.getElementById('dots').classList.remove('on');
  btn.disabled=false; btn.textContent='✦ Gerar com IA';
}

async function copyPitch(){
  if(!pitchText) return;
  try{ await navigator.clipboard.writeText(pitchText); }catch(e){}
  const btn=document.getElementById('cpyBtn');
  btn.textContent='✅ Copiado!'; btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='📋 Copiar Email';btn.classList.remove('ok');},2200);
}

render();
</script>
